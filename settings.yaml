# Hardware Calibrations
camera:
  resolution: [1920, 1080]
  fps: 30
  fov: 120

gaze_tracker:
  sampling_rate_hz: 60
  calibration_error_margin: 0.5 # measured in degrees

# Pipeline Parameters
pipeline:
  look_back_threshold: 5.0 # seconds of history to maintain in the mental map graph
  attention_decay_rate: 0.1 # decay factor for objects outside of focal vision

# API Keys
api_keys:
  llm_api_key: "YOUR_API_KEY_HERE" # Replace with your actual LLM provider key or load via ENV var